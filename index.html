<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Tasks level-1</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: Green;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .calc-box {
            margin-top: 40px;
        }

        input {
            padding: 10px;
            width: 100px;
            margin: 5px;
        }
    </style>
</head>
<body>

    <h1>JavaScript Level 1 Tasks</h1>

    <!-- ✅ Task 1: Button Color Change -->
    <h2>1. Button Color Change</h2>
    <button onclick="changeColor()" id="colorBtn">Click Me</button>

    <!-- ✅ Task 2: Greeting Alert -->
    <h2>2. Greeting Message</h2>
    <button onclick="showGreeting()">Show Greeting</button>

    <!-- ✅ Task 3: Simple Calculator -->
    <div class="calc-box">
        <h2>3. Simple Calculator</h2>
        <input type="number" id="num1" placeholder="Number 1">
        <input type="number" id="num2" placeholder="Number 2"><br><br>
        <button onclick="addNumbers()">Add</button>
        <p id="result"></p>
    </div>

    <script>
        // Task 1: Change button color
        function changeColor() {
            let btn = document.getElementById("colorBtn");
            btn.style.backgroundColor = "red";
        }

        // Task 2: Greeting based on time
        function showGreeting() {
            let hour = new Date().getHours();
            let message;

            if (hour < 12) {
                message = "Good Morning!";
            } else if (hour < 18) {
                message = "Good Afternoon!";
            } else {
                message = "Good Evening!";
            }

            alert(message);
        }

        // Task 3: Add two numbers
        function addNumbers() {
            let n1 = Number(document.getElementById("num1").value);
            let n2 = Number(document.getElementById("num2").value);

            let sum = n1 + n2;

            document.getElementById("result").innerText = "Result: " + sum;
        }
    </script>

</body>
</html>
